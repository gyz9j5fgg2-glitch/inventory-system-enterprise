version: '3.8'

# 开发环境配置

services:
  api:
    volumes:
      # 开发模式挂载代码，支持热重载
      - ../backend/app:/app/app
    environment:
      DEBUG: "true"
      LOG_LEVEL: DEBUG
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  postgres:
    ports:
      # 开发环境暴露端口，方便本地工具连接
      - "5432:5432"

  redis:
    ports:
      # 开发环境暴露端口
      - "6379:6379"

  # 开发环境添加 pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  # 开发环境添加 Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
